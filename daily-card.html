<style>
  :root{
    color-scheme:light;
    --bg:#FFF7E6; --bg-2:#FFFCF4; --card:#FFFFFF;
    --ink:#241D14; --ink-2:#5A5042; --muted:#9C907A;
    --accent:#FF6A3D; --accent-2:#FF8A5E; --accent-shadow:#C8451F;
    --yellow:#FFC527; --yellow-soft:#FFE08A;
    --green:#1FA85A; --green-deep:#12643A; --line:#F0DEB6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 22px;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 18% 12%, color-mix(in srgb,var(--yellow) 30%,transparent), transparent 42%),
                     radial-gradient(circle at 86% 88%, color-mix(in srgb,var(--accent) 22%,transparent), transparent 46%);
  }
  .serif{font-family:'Fraunces','Georgia',serif}

  .top{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:15px;letter-spacing:.02em;margin-bottom:22px;white-space:nowrap}
  .top .d{width:12px;height:12px;border-radius:50%;background:var(--yellow);border:2px solid var(--ink)}
  .top b{color:var(--accent)}

  .eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--yellow);
    font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:7px 15px;border-radius:999px;margin-bottom:14px}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(32px,8vw,46px);line-height:1.12;letter-spacing:-.03em;text-align:center;padding-bottom:.08em}
  h1 em{font-style:italic;font-weight:500;color:var(--accent)}
  .sub{color:var(--ink-2);font-size:16px;text-align:center;margin-top:18px;margin-bottom:30px;font-weight:600}

  .deck{width:100%;max-width:420px;perspective:1100px}
  .card{
    background:var(--card);border:3px solid var(--ink);border-radius:28px;
    padding:40px 30px 36px;box-shadow:0 12px 0 0 var(--ink);
    min-height:248px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
    position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;left:-60px;top:-60px;width:150px;height:150px;border-radius:50%;
    background:var(--bird-glow,var(--yellow-soft));opacity:.55;z-index:0}
  .card>*{position:relative;z-index:1}
  .card.spin{animation:wob .12s linear}
  @keyframes wob{0%{transform:translateY(-4px) rotate(-1deg)}100%{transform:translateY(4px) rotate(1.2deg)}}
  .card.pop{animation:pop .42s cubic-bezier(.2,1.4,.5,1)}
  @keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.04)}100%{transform:scale(1)}}

  .tag{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    padding:7px 15px;border-radius:999px;margin-bottom:22px;border:2.5px solid var(--ink)}
  .tag::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.65}
  .t-coral{background:color-mix(in srgb,var(--accent) 22%,#fff);color:#B5380F}
  .t-teal{background:color-mix(in srgb,var(--green) 20%,#fff);color:#15663A}
  .t-lilac{background:color-mix(in srgb,var(--green-deep) 18%,#fff);color:var(--green-deep)}
  .t-yellow{background:var(--yellow-soft);color:#8A6500}
  .t-ink{background:#EDE3CC;color:var(--ink)}

  .card .text{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(21px,5.4vw,27px);line-height:1.26;letter-spacing:-.01em;text-wrap:balance}

  .btn{margin-top:26px;width:100%;max-width:420px;border:3px solid var(--ink);cursor:pointer;font-family:'Manrope',sans-serif;font-weight:800;
    background:var(--accent);color:#fff;border-radius:999px;padding:18px;font-size:19px;letter-spacing:-.01em;
    box-shadow:0 8px 0 0 var(--ink);transition:transform .1s,box-shadow .1s;display:flex;align-items:center;justify-content:center;gap:10px}
  .btn:hover{background:var(--accent-2)}
  .btn:active{transform:translateY(8px);box-shadow:0 0 0 0 var(--ink)}
  .btn[disabled]{opacity:.85;cursor:default;transform:none;box-shadow:0 8px 0 0 var(--ink)}
  .btn svg{width:22px;height:22px}

  .hint{margin-top:16px;color:var(--ink-2);font-size:14px;text-align:center;max-width:420px;font-weight:600;min-height:20px}
</style>

<body class="chakra-ui-light">

  <div class="top"><span class="d"></span>СТАЯ&nbsp;·&nbsp;<b>be smart</b></div>

  <div class="eyebrow">застряла? крути 🐣</div>
  <h1 class="serif">Карточка <em>дня</em></h1>
  <div class="sub">Один пендель в день. Остальное — для настроения.</div>

  <div class="deck">
    <div class="card" id="card" style="--bird-glow: #E4D9C0;">
      <span class="tag t-ink" id="tag">сарказм</span>
      <div class="text serif" id="text">Ждёшь мотивацию? Она просила передать, что не придёт. Начинай без неё.</div>
    </div>
  </div>

  <button class="btn" id="spin">
    <svg viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 1 1-3.4-7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"></path><path d="M21 4v5h-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path></svg>
    Крутить барабан
  </button>
  <div class="hint" id="hint">Нажми «Крутить барабан».</div>

<script>
  const CARDS = [
    {t:"Астрологи объявили день первого клика. Ткни в задачу.", c:"coral", g:"инициация"},
    {t:"Начни неприлично маленько.", c:"coral", g:"инициация"},
    {t:"Подходящее состояние отменили. Делай так.", c:"coral", g:"инициация"},
    {t:"Ставь таймер на 3 минуты и делай только 3 минуты.", c:"coral", g:"инициация"},
    {t:"Фокус-покус — чит-код на концентрацию на 10 минут. Срочно применяй.", c:"coral", g:"инициация"},
    {t:"Ёрзай и вертись.", c:"teal", g:"тело"},
    {t:"Сидишь в позе креветки? Расправься.", c:"teal", g:"тело"},
    {t:"Сегодня будем работать под столом. Лезь. Доверься.", c:"teal", g:"тело"},
    {t:"Астрологи объявили день внутренней чайки. Хочется орать — сначала вода, еда, пауза.", c:"lilac", g:"состояние"},
    {t:"Ты не обязана страдать, чтобы задача считалась.", c:"lilac", g:"состояние"},
    {t:"День стаи. Поддержи соседнего птенца.", c:"teal", g:"стая"},
    {t:"Рядом с кем-то дела доделываются. Зови на даблинг.", c:"teal", g:"стая"},
    {t:"Не тащи одна. Принеси задачу на созвон.", c:"teal", g:"стая"},
    {t:"«Потом» звонил. Спрашивает, когда перестанешь сваливать всё на него. Сделай кривой кусочек сейчас.", c:"ink", g:"сарказм"},
    {t:"План «сделаю всё завтра» снова в продаже. Завтра передаёт привет с прошлого вторника.", c:"ink", g:"сарказм"},
    {t:"Ждёшь мотивацию? Она просила передать, что не придёт. Начинай без неё.", c:"ink", g:"сарказм"},
    {t:"30 пунктов в списке? Смело. Выбери один — остальные подождут, они привыкли.", c:"ink", g:"сарказм"},
    {t:"Астрологи объявили день чистой раковины. Помой одну тарелку.", c:"yellow", g:"быт"},
    {t:"Астрологи объявили день новой наволочки. Смени одну.", c:"yellow", g:"быт"},
    {t:"Астрологи объявили день влюблённых носков. Сложи хоть одну пару в ящик.", c:"yellow", g:"быт"},
    {t:"Покакали, поквакали — и за работу.", c:"teal", g:"стая"},
    {t:"Пусть твои тревоги унесут единороги.", c:"lilac", g:"бонус"},
    {t:"Поплакали, покакали — садимся за задачу.", c:"lilac", g:"бонус"},
    {t:"Трудные задачи создают сильных котят.", c:"lilac", g:"бонус"},
    {t:"Ной не ныл — и ты не ной.", c:"lilac", g:"бонус"},
    {t:"Преступность организованная, а ты — нет.", c:"lilac", g:"бонус"},
    {t:"Говоришь «пу-пу-пу» и двигаешься дальше.", c:"lilac", g:"бонус"},
    {t:"Это фея мотивации — пуньк! У тебя 9 минут мотивации — БЫСТРЕЕЕ.", c:"lilac", g:"бонус"}
  ];

  const GLOW = {coral:"color-mix(in srgb,var(--accent) 30%,#fff)", teal:"color-mix(in srgb,var(--green) 26%,#fff)",
                lilac:"color-mix(in srgb,var(--green-deep) 22%,#fff)", yellow:"var(--yellow-soft)", ink:"#E4D9C0"};

  const cardEl=document.getElementById('card'), textEl=document.getElementById('text'),
        tagEl=document.getElementById('tag'), btn=document.getElementById('spin'), hint=document.getElementById('hint');

  function show(i){
    const card=CARDS[i];
    textEl.textContent=card.t;
    tagEl.textContent=card.g;
    tagEl.className='tag t-'+card.c;
    cardEl.style.setProperty('--bird-glow', GLOW[card.c]||'var(--yellow-soft)');
  }
  function rnd(){ return Math.floor(Math.random()*CARDS.length); }

  // карточка дня: одна на сутки, сохраняется в браузере
  function todayCard(){
    const key=new Date().toISOString().slice(0,10);
    let saved=localStorage.getItem('karta_'+key);
    if(saved===null){ saved=rnd(); localStorage.setItem('karta_'+key, saved); }
    return parseInt(saved,10);
  }

  let first=true;
  function spin(){
    btn.disabled=true;
    let ticks=0, total=16;
    const iv=setInterval(()=>{
      show(rnd());
      cardEl.classList.add('spin');
      setTimeout(()=>cardEl.classList.remove('spin'),100);
      ticks++;
      if(ticks>=total){
        clearInterval(iv);
        const i = first ? todayCard() : rnd();
        show(i);
        cardEl.classList.add('pop');
        setTimeout(()=>cardEl.classList.remove('pop'),420);
        btn.disabled=false;
        btn.textContent='Крутить ещё';
        hint.textContent= first ? 'Это твоя карточка на сегодня. Можно крутить ещё для настроения.' : '';
        first=false;
      }
    },70);
  }

  btn.addEventListener('click', spin);
  show(todayCard());
  hint.textContent='Нажми «Крутить барабан».';
</script>
