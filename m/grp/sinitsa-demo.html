<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Птичка · 9 этапов v5</title>
<style>
  :root{
    --ink:#1a1614; --soft:#4a423d; --muted:#857c75;
    --bg:#fbf8ee; --paper:#fbf8ee; --milk:#f3ecdb;
    --accent:#f0b400; --accent-soft:#f4ebd0; --accent-deep:#7a5b00;
    --sage:#6f8a6a; --sage-deep:#2f4434;
    --rust:#a05a3c; --coral:#c76450;
    --line:#e1dcd1;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:48px 24px 64px;
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.55;
  }
  .wrap{max-width:1100px; margin:0 auto}
  h1{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:38px; font-weight:600; letter-spacing:-.02em; margin:0 0 10px;
  }
  .sub{color:var(--soft); font-size:15px; margin:0 0 40px; max-width:680px}

  .stages{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:36px 24px;
  }
  .stage{
    text-align:center;
    position:relative;
  }
  .stage .holder{
    width:200px; height:200px; margin:0 auto 18px;
    display:flex; align-items:center; justify-content:center;
  }
  .stage .holder svg{max-width:100%; max-height:100%}
  .stage .num{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:13px; font-style:italic;
    color:var(--muted); margin-bottom:6px;
  }
  .stage .name{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:22px; font-weight:600; margin:2px 0 8px; line-height:1.15;
    letter-spacing:-.01em;
  }
  .stage .desc{
    font-size:14px; color:var(--soft); line-height:1.5;
    font-style:italic;
    max-width:210px; margin:0 auto;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Птичка · 9 этапов</h1>
  <p class="sub">Одна и та же птичка проходит свой путь. От яйца до королевы стаи. Hand-drawn, тёплое, немного ироничное.</p>

  <div class="stages" id="grid"></div>
</div>

<!-- Глобальные SVG-фильтры -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- Лёгкая «дрожь» линии — намеренная, но аккуратная -->
    <filter id="hand" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2"/>
    </filter>
  </defs>
</svg>

<script>
const INK = "#1a1614";

// =============================================================
// КАНОНИЧНЫЙ СИЛУЭТ ТЕЛА — одна форма для всех стадий
// Каплевидное тело с округлой головой сверху,
// плечом сбоку (откуда выходит крыло) и хвостиком сзади.
// Параметры: cx, cy — центр; flip=false — смотрит ВЛЕВО; tilt — наклон тела;
// stand=true — есть лапки; eye — позиция глаза; mood — выражение.
// =============================================================

// Базовая форма тела (smooth caplevidnaya forma)
// Птичка смотрит ВЛЕВО (клюв и глаз слева).
function bodyPath(cx, cy){
  // координаты относительно центра
  // голова сверху-слева, тело округлое снизу, хвост справа
  return `M ${cx-38} ${cy-10}
          Q ${cx-42} ${cy-38} ${cx-18} ${cy-44}
          Q ${cx+8}  ${cy-46} ${cx+22} ${cy-30}
          Q ${cx+42} ${cy-14} ${cx+44} ${cy+12}
          Q ${cx+42} ${cy+34} ${cx+18} ${cy+40}
          Q ${cx-12} ${cy+42} ${cx-30} ${cy+30}
          Q ${cx-42} ${cy+10} ${cx-38} ${cy-10} Z`;
}

// Маленький треугольный хвостик справа
function tail(cx, cy){
  return `<path d="M ${cx+40} ${cy+8} L ${cx+58} ${cy+2} L ${cx+50} ${cy+18} Z"
                fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>`;
}

// Крыло "лежит" сбоку
function wingLying(cx, cy){
  return `<path d="M ${cx+5} ${cy-12} Q ${cx+18} ${cy-6} ${cx+22} ${cy+10} Q ${cx+10} ${cy+18} ${cx} ${cy+6} Z"
                fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M ${cx+8} ${cy-6} Q ${cx+16} ${cy+2} ${cx+18} ${cy+10}" fill="none" stroke="${INK}" stroke-width="1.4"/>`;
}

// Крыло развёрнуто наполовину (для «осматривается», «осваивается»)
function wingHalf(cx, cy){
  return `<path d="M ${cx+2} ${cy-14} Q ${cx+22} ${cy-12} ${cx+30} ${cy+4} Q ${cx+22} ${cy+18} ${cx+4} ${cy+10} Z"
                fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M ${cx+10} ${cy-8} Q ${cx+22} ${cy} ${cx+25} ${cy+10}" fill="none" stroke="${INK}" stroke-width="1.4"/>`;
}

// Крыло, "пробует взмах" — поднято вверх
function wingTryLeft(cx, cy){
  return `<path d="M ${cx-32} ${cy-12} Q ${cx-50} ${cy-30} ${cx-58} ${cy-22} Q ${cx-50} ${cy-6} ${cx-28} ${cy} Z"
                fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M ${cx-44} ${cy-18} Q ${cx-50} ${cy-12} ${cx-48} ${cy-6}" fill="none" stroke="${INK}" stroke-width="1.4"/>`;
}
function wingTryRight(cx, cy){
  return `<path d="M ${cx+10} ${cy-14} Q ${cx+30} ${cy-30} ${cx+38} ${cy-22} Q ${cx+30} ${cy-6} ${cx+14} ${cy-2} Z"
                fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M ${cx+24} ${cy-18} Q ${cx+30} ${cy-12} ${cx+28} ${cy-6}" fill="none" stroke="${INK}" stroke-width="1.4"/>`;
}

// Раскрытые в полёте крылья — широкие
function wingFlyLeft(cx, cy){
  return `<path d="M ${cx-30} ${cy-8} Q ${cx-66} ${cy-22} ${cx-78} ${cy-2} Q ${cx-60} ${cy+10} ${cx-26} ${cy+6} Z"
                fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M ${cx-50} ${cy-4} Q ${cx-58} ${cy} ${cx-58} ${cy+6}" fill="none" stroke="${INK}" stroke-width="1.3"/>
          <path d="M ${cx-60} ${cy-8} Q ${cx-66} ${cy-4} ${cx-66} ${cy+4}" fill="none" stroke="${INK}" stroke-width="1.3"/>`;
}
function wingFlyRight(cx, cy){
  return `<path d="M ${cx+10} ${cy-8} Q ${cx+46} ${cy-22} ${cx+58} ${cy-2} Q ${cx+40} ${cy+10} ${cx+6} ${cy+6} Z"
                fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M ${cx+30} ${cy-4} Q ${cx+38} ${cy} ${cx+38} ${cy+6}" fill="none" stroke="${INK}" stroke-width="1.3"/>
          <path d="M ${cx+40} ${cy-8} Q ${cx+46} ${cy-4} ${cx+46} ${cy+4}" fill="none" stroke="${INK}" stroke-width="1.3"/>`;
}

// Глаз — простая точка (mood: 'open', 'soft', 'closed', 'curious')
function eye(x, y, mood='open'){
  if (mood === 'closed') return `<path d="M ${x-4} ${y} Q ${x} ${y+3} ${x+4} ${y}" fill="none" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>`;
  if (mood === 'soft')   return `<path d="M ${x-3} ${y} Q ${x} ${y-2} ${x+3} ${y}" fill="none" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>`;
  if (mood === 'wide')   return `<circle cx="${x}" cy="${y}" r="3.2" fill="${INK}"/>`;
  // default — open dot
  return `<circle cx="${x}" cy="${y}" r="2.4" fill="${INK}"/>`;
}

// Маленький треугольный клюв слева
function beak(x, y, size=8){
  return `<path d="M ${x} ${y-2} L ${x-size} ${y+2} L ${x} ${y+6} Z" fill="#f0b400" stroke="${INK}" stroke-width="1.6" stroke-linejoin="round"/>`;
}

// Лапки-палочки с тремя пальцами
function legs(x1, x2, y, h=18){
  return `
    <line x1="${x1}" y1="${y}" x2="${x1-1}" y2="${y+h}" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>
    <line x1="${x2}" y1="${y}" x2="${x2+1}" y2="${y+h}" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>
    <path d="M ${x1-6} ${y+h} L ${x1-1} ${y+h+3} L ${x1+4} ${y+h}" fill="none" stroke="${INK}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M ${x2-4} ${y+h} L ${x2+1} ${y+h+3} L ${x2+6} ${y+h}" fill="none" stroke="${INK}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  `;
}

// =============================================================
// 9 ИЛЛЮСТРАЦИЙ
// =============================================================
const STAGES = [

  // ========== 1. ЯЙЦО ==========
  {
    num: '01', name: 'Яйцо',
    desc: 'Только заглянула — что-то скоро начнётся',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="180" rx="42" ry="3" fill="${INK}" opacity=".15"/>
      <g filter="url(#hand)">
        <path d="M 100 52 Q 65 58 60 110 Q 60 166 100 170 Q 140 166 140 110 Q 135 58 100 52 Z"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2.6"/>
        <!-- 5 аккуратных крапинок -->
        <ellipse cx="86" cy="85" rx="2.5" ry="2" fill="${INK}" opacity=".55" transform="rotate(20 86 85)"/>
        <ellipse cx="118" cy="100" rx="2" ry="2.5" fill="${INK}" opacity=".55" transform="rotate(-15 118 100)"/>
        <ellipse cx="78" cy="125" rx="2.8" ry="2.2" fill="${INK}" opacity=".5" transform="rotate(30 78 125)"/>
        <ellipse cx="122" cy="138" rx="2.4" ry="2" fill="${INK}" opacity=".55"/>
        <ellipse cx="98" cy="148" rx="2" ry="2" fill="${INK}" opacity=".5"/>
      </g>
    </svg>`,
  },

  // ========== 2. ТРЕЩИНКА ==========
  {
    num: '02', name: 'Трещинка',
    desc: 'Уже слышно: внутри кто-то собирается выйти',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="180" rx="42" ry="3" fill="${INK}" opacity=".15"/>
      <g filter="url(#hand)">
        <path d="M 100 52 Q 65 58 60 110 Q 60 166 100 170 Q 140 166 140 110 Q 135 58 100 52 Z"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2.6"/>
        <!-- аккуратная диагональная трещинка -->
        <path d="M 78 80 L 88 85 L 84 92 L 96 96 L 92 105 L 105 102"
              fill="none" stroke="${INK}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
        <!-- крошечный глазик подглядывает из трещины -->
        <circle cx="93" cy="98" r="1.5" fill="${INK}"/>
        <!-- маленькие звуковые штрихи -->
        <path d="M 50 88 L 44 86" stroke="${INK}" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M 50 96 L 42 96" stroke="${INK}" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M 150 88 L 156 86" stroke="${INK}" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M 150 96 L 158 96" stroke="${INK}" stroke-width="1.6" stroke-linecap="round"/>
        <!-- крапинки на нижней части -->
        <ellipse cx="80" cy="135" rx="2.5" ry="2" fill="${INK}" opacity=".5"/>
        <ellipse cx="120" cy="130" rx="2.2" ry="2.4" fill="${INK}" opacity=".5"/>
        <ellipse cx="100" cy="150" rx="2" ry="2" fill="${INK}" opacity=".5"/>
      </g>
    </svg>`,
  },

  // ========== 3. ВЫЛУПИЛАСЬ ==========
  {
    num: '03', name: 'Вылупилась',
    desc: 'Появилась. Пока не поняла, куда именно',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="188" rx="55" ry="3" fill="${INK}" opacity=".15"/>
      <g filter="url(#hand)">
        <!-- нижняя половина скорлупы как чаша -->
        <path d="M 50 138 Q 50 184 100 188 Q 150 184 150 138 L 138 148 L 124 138 L 110 150 L 98 138 L 86 148 L 74 138 L 62 148 Z"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2.6" stroke-linejoin="round"/>
        <!-- птичка-капля торчит из скорлупы, та же базовая форма -->
        <path d="M 70 130 Q 65 80 100 70 Q 132 70 135 110 Q 135 140 100 145 Q 72 145 70 130 Z"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2.5"/>
        <!-- кусочек скорлупы на голове -->
        <path d="M 84 72 L 92 60 L 96 72 L 104 62 L 110 72"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2.3" stroke-linejoin="round" stroke-linecap="round"/>
        <!-- мягкие чуть растерянные глазки -->
        <circle cx="88" cy="105" r="2.4" fill="${INK}"/>
        <circle cx="112" cy="105" r="2.4" fill="${INK}"/>
        <!-- приподнятые брови -->
        <path d="M 82 96 Q 87 92 92 96" fill="none" stroke="${INK}" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M 108 96 Q 113 92 118 96" fill="none" stroke="${INK}" stroke-width="1.6" stroke-linecap="round"/>
        <!-- маленький клюв -->
        <path d="M 100 116 L 94 122 L 106 122 Z" fill="#f0b400" stroke="${INK}" stroke-width="1.6" stroke-linejoin="round"/>
      </g>
    </svg>`,
  },

  // ========== 4. Я В ПУТИ ==========
  {
    num: '04', name: 'Я в пути',
    desc: 'Стою на лапках и делаю вид, что так и было задумано',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- следы аккуратнее, дугой -->
      <g filter="url(#hand)" opacity=".5">
        <path d="M 30 178 L 26 184 M 30 178 L 34 184" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 44 184 L 40 190 M 44 184 L 48 190" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 58 178 L 54 184 M 58 178 L 62 184" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
      </g>
      <ellipse cx="105" cy="180" rx="32" ry="3" fill="${INK}" opacity=".15"/>
      <g filter="url(#hand)" transform="rotate(-3 105 115)">
        <!-- единое каплевидное тело (наклон вперёд) -->
        ${bodyPath(105, 115)}
        <path d="${bodyPath(105, 115)}" fill="#fbf8ee" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>
        ${tail(105, 115)}
        ${wingLying(105, 115)}
        <!-- маленький рюкзачок сверху-сзади -->
        <path d="M 130 88 Q 142 84 144 96 Q 142 108 132 110 Q 124 106 126 96 Q 126 88 130 88 Z"
              fill="#a05a3c" stroke="${INK}" stroke-width="2" stroke-linejoin="round"/>
        <!-- лямка рюкзака -->
        <path d="M 130 92 Q 122 100 118 112" fill="none" stroke="${INK}" stroke-width="1.6"/>
        <!-- глаз решительный -->
        ${eye(75, 102, 'open')}
        <!-- маленькая бровь -->
        <path d="M 72 95 Q 76 93 80 95" fill="none" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <!-- клюв -->
        ${beak(63, 108)}
      </g>
      <!-- лапки уверенно -->
      <g filter="url(#hand)">
        ${legs(94, 116, 152, 22)}
      </g>
    </svg>`,
  },

  // ========== 5. ОСМАТРИВАЕТСЯ ==========
  {
    num: '05', name: 'Осматривается',
    desc: 'Начинаю понимать, где я и куда дальше',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="180" rx="42" ry="3" fill="${INK}" opacity=".15"/>
      <g filter="url(#hand)">
        ${bodyPath(100, 115)}
        <path d="${bodyPath(100, 115)}" fill="#fbf8ee" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>
        ${tail(100, 115)}
        <!-- крыло чуть приподнято — держит карту -->
        <path d="M 100 100 Q 122 100 130 116 Q 122 128 108 124 Q 100 116 100 100 Z"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
        <!-- голова повёрнута вправо-вниз, к карте -->
        <!-- любопытный глаз -->
        ${eye(78, 100, 'curious')}
        <circle cx="78" cy="100" r="2.4" fill="${INK}"/>
        <!-- приподнятая бровь -->
        <path d="M 73 90 Q 78 88 83 91" fill="none" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        ${beak(60, 108)}
        <!-- КАРТА — небольшая, аккуратно сложена -->
        <path d="M 122 130 L 156 124 L 160 148 L 124 152 Z"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2" stroke-linejoin="round"/>
        <!-- маршрут пунктиром -->
        <path d="M 130 138 Q 138 134 146 140 Q 152 144 156 140"
              fill="none" stroke="${INK}" stroke-width="1.3" stroke-dasharray="2 3" stroke-linecap="round"/>
        <!-- точка старта и финиша -->
        <circle cx="130" cy="138" r="1.8" fill="#f0b400" stroke="${INK}" stroke-width="1"/>
        <circle cx="156" cy="140" r="1.8" fill="${INK}"/>
        <!-- складка карты -->
        <line x1="140" y1="126" x2="142" y2="150" stroke="${INK}" stroke-width="1" opacity=".4"/>
      </g>
      <g filter="url(#hand)">
        ${legs(94, 116, 152, 20)}
      </g>
    </svg>`,
  },

  // ========== 6. СОБИРАЕТ ИНСТРУМЕНТЫ ==========
  {
    num: '06', name: 'Собирает инструменты',
    desc: 'Нашла пару штуковин, которые и правда помогают',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="180" rx="44" ry="3" fill="${INK}" opacity=".15"/>
      <g filter="url(#hand)">
        ${bodyPath(100, 115)}
        <path d="${bodyPath(100, 115)}" fill="#fbf8ee" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>
        ${tail(100, 115)}
        <!-- крыло держит маленький блокнот -->
        <path d="M 100 100 Q 122 102 128 118 Q 120 130 108 124 Q 100 116 100 100 Z"
              fill="#fbf8ee" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
        <!-- блокнотик в крыле -->
        <rect x="118" y="118" width="16" height="20" rx="1" fill="#fbf8ee" stroke="${INK}" stroke-width="1.8"/>
        <line x1="121" y1="124" x2="131" y2="124" stroke="${INK}" stroke-width="1" opacity=".6"/>
        <line x1="121" y1="129" x2="131" y2="129" stroke="${INK}" stroke-width="1" opacity=".6"/>
        <line x1="121" y1="134" x2="128" y2="134" stroke="${INK}" stroke-width="1" opacity=".6"/>
        <!-- галочка наверху блокнота -->
        <path d="M 132 116 L 134 119 L 138 113" fill="none" stroke="#6f8a6a" stroke-width="1.6" stroke-linecap="round"/>
        <!-- маленький карандашик торчит из-за головы -->
        <line x1="92" y1="76" x2="98" y2="58" stroke="#f0b400" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="97" y1="59" x2="100" y2="55" stroke="${INK}" stroke-width="1.8" stroke-linecap="round"/>
        <!-- очки — лёгкие, простые -->
        <circle cx="78" cy="100" r="7" fill="none" stroke="${INK}" stroke-width="1.8"/>
        <ellipse cx="78" cy="100" r="1.8" fill="${INK}"/>
        <path d="M 70 102 L 65 104" fill="none" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <!-- бровь сосредоточенная -->
        <path d="M 72 89 L 84 91" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        ${beak(60, 108)}
      </g>
      <g filter="url(#hand)">
        ${legs(94, 116, 152, 20)}
      </g>
    </svg>`,
  },

  // ========== 7. ПРОБУЕТ КРЫЛЬЯ ==========
  {
    num: '07', name: 'Пробует крылья',
    desc: 'Пока не полёт, но уже очень подозрительно',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="188" rx="30" ry="3" fill="${INK}" opacity=".1"/>
      <!-- линии движения вокруг крыльев -->
      <g filter="url(#hand)" opacity=".55">
        <path d="M 35 90 L 28 95" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 32 102 L 24 105" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 165 90 L 172 95" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 168 102 L 176 105" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
      </g>
      <g filter="url(#hand)">
        <!-- тело — приподнято, чуть подпрыгнула -->
        ${bodyPath(100, 110)}
        <path d="${bodyPath(100, 110)}" fill="#fbf8ee" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>
        ${tail(100, 110)}
        <!-- ОБА КРЫЛА — реально из тела, не уши -->
        ${wingTryLeft(100, 105)}
        ${wingTryRight(100, 105)}
        <!-- сосредоточенный глаз -->
        ${eye(78, 100, 'open')}
        <!-- сосредоточенная бровь -->
        <path d="M 74 92 L 84 93" stroke="${INK}" stroke-width="1.6" stroke-linecap="round"/>
        <!-- сжатый клюв -->
        ${beak(60, 108)}
        <!-- лапки приподняты (прыжок) — короткие, чуть согнуты -->
        <path d="M 92 148 Q 90 160 92 170" fill="none" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>
        <path d="M 112 148 Q 114 160 112 170" fill="none" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>
        <path d="M 87 170 L 96 170" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>
        <path d="M 108 170 L 117 170" stroke="${INK}" stroke-width="2" stroke-linecap="round"/>
      </g>
    </svg>`,
  },

  // ========== 8. ЛЕТИТ ==========
  {
    num: '08', name: 'Летит',
    desc: 'Оторвалась от земли. Немного сама в шоке',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- лёгкое сияние / ветер -->
      <g filter="url(#hand)" opacity=".5">
        <path d="M 18 130 L 8 134" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 20 144 L 10 148" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 182 130 L 192 134" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 180 144 L 190 148" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>
      </g>
      <ellipse cx="100" cy="190" rx="22" ry="2" fill="${INK}" opacity=".08"/>
      <g filter="url(#hand)" transform="rotate(-8 100 105)">
        <!-- большое крыло слева -->
        ${wingFlyLeft(100, 100)}
        <!-- тело — наклонено вперёд -->
        ${bodyPath(100, 105)}
        <path d="${bodyPath(100, 105)}" fill="#fbf8ee" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>
        ${tail(100, 105)}
        <!-- большое крыло справа -->
        ${wingFlyRight(100, 100)}
        <!-- удивлённые глазки -->
        ${eye(75, 95, 'wide')}
        <!-- приподнятая бровь — «ого» -->
        <path d="M 70 84 Q 75 80 80 84" fill="none" stroke="${INK}" stroke-width="1.5" stroke-linecap="round"/>
        <!-- маленький открытый клюв -->
        <path d="M 60 102 L 50 100 L 60 108 Z" fill="#f0b400" stroke="${INK}" stroke-width="1.6" stroke-linejoin="round"/>
        <!-- лёгкий парчаментовый плащ из-под крыла -->
        <path d="M 100 135 Q 88 162 96 180 Q 110 170 114 145 Z"
              fill="#f4ebd0" stroke="${INK}" stroke-width="1.6" stroke-linejoin="round" opacity=".95"/>
        <!-- лапки поджаты -->
        <path d="M 92 142 Q 88 152 90 162" fill="none" stroke="${INK}" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M 110 142 Q 114 152 112 162" fill="none" stroke="${INK}" stroke-width="1.8" stroke-linecap="round"/>
      </g>
    </svg>`,
  },

  // ========== 9. КОРОЛЕВА СТАИ ==========
  {
    num: '09', name: 'Королева стаи',
    desc: 'Не стала идеальной. Просто теперь у неё есть крылья, корона и план',
    svg: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- лёгкое сияние -->
      <g opacity=".55">
        <line x1="100" y1="20" x2="100" y2="30" stroke="#f0b400" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="50" y1="40" x2="56" y2="46" stroke="#f0b400" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="150" y1="40" x2="144" y2="46" stroke="#f0b400" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="40" cy="65" r="1.5" fill="#f0b400"/>
        <circle cx="160" cy="65" r="1.5" fill="#f0b400"/>
      </g>
      <ellipse cx="100" cy="180" rx="44" ry="3" fill="${INK}" opacity=".15"/>
      <g filter="url(#hand)">
        <!-- лёгкий плащик за спиной -->
        <path d="M 130 90 Q 152 130 144 175 Q 132 168 124 140 Z"
              fill="#f4ebd0" stroke="${INK}" stroke-width="1.8" stroke-linejoin="round"/>
        <!-- тело -->
        ${bodyPath(100, 115)}
        <path d="${bodyPath(100, 115)}" fill="#fbf8ee" stroke="${INK}" stroke-width="2.5" stroke-linejoin="round"/>
        ${tail(100, 115)}
        <!-- крыло уверенно сложено -->
        ${wingLying(100, 115)}
        <!-- КОРОНА — 3 зубца, аккуратная, не перегруженная -->
        <path d="M 82 64 L 86 48 L 94 60 L 100 44 L 106 60 L 114 48 L 118 64 Z"
              fill="#f0b400" stroke="${INK}" stroke-width="2.2" stroke-linejoin="round"/>
        <!-- маленькие точки-камни на короне -->
        <circle cx="100" cy="56" r="1.8" fill="${INK}"/>
        <circle cx="89" cy="58" r="1.3" fill="${INK}"/>
        <circle cx="111" cy="58" r="1.3" fill="${INK}"/>
        <!-- спокойные уверенные глаза с лёгкой улыбкой -->
        ${eye(78, 100, 'soft')}
        <!-- лёгкая улыбка-намёк под клювом -->
        <path d="M 64 116 Q 70 120 76 116" fill="none" stroke="${INK}" stroke-width="1.3" stroke-linecap="round"/>
        ${beak(60, 108)}
      </g>
      <g filter="url(#hand)">
        ${legs(94, 116, 152, 20)}
      </g>
    </svg>`,
  },
];

const grid = document.getElementById('grid');
STAGES.forEach(s => {
  const card = document.createElement('div');
  card.className = 'stage';
  card.innerHTML = `
    <div class="holder">${s.svg}</div>
    <div class="num">${s.num}</div>
    <div class="name">${s.name}</div>
    <div class="desc">${s.desc}</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
