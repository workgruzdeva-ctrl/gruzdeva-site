<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Птичка · 9 этапов</title>
<style>
  :root{
    --ink:#1a1614; --soft:#4a423d; --muted:#857c75;
    --bg:#faf6ee; --paper:#faf6ee;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:48px 24px 64px;
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.55;
  }
  .wrap{max-width:1100px; margin:0 auto}
  h1{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:38px; font-weight:600; letter-spacing:-.02em; margin:0 0 10px;
  }
  .sub{color:var(--soft); font-size:15px; margin:0 0 48px; max-width:680px}

  .stages{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:40px 24px;
  }
  .stage{ text-align:center; }
  .stage .holder{
    width:200px; height:200px; margin:0 auto 14px;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .stage .holder img{
    max-width:100%;
    max-height:100%;
    width:auto; height:auto;
    object-fit:contain;
    display:block;
  }
  .stage .num{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:13px; font-style:italic;
    color:var(--muted); margin-bottom:6px;
  }
  .stage .name{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:21px; font-weight:600; margin:2px 0 8px; line-height:1.15;
    letter-spacing:-.01em;
  }
  .stage .desc{
    font-size:13.5px; color:var(--soft); line-height:1.55;
    font-style:italic;
    max-width:210px; margin:0 auto;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Птичка · 9 этапов</h1>
  <p class="sub">Одна и та же птичка проходит свой путь — от яйца до королевы стаи.</p>

  <div class="stages" id="grid"></div>
</div>

<script>
const STAGES = [
  { file: '01_yaitso.png',                num: '01', name: 'Яйцо',                desc: 'Только заглянула — что-то скоро начнётся' },
  { file: '02_treshchinka.png',           num: '02', name: 'Трещинка',            desc: 'Уже слышно: внутри кто-то собирается выйти' },
  { file: '03_vylupilas.png',             num: '03', name: 'Вылупилась',          desc: 'Появилась. Пока не поняла, куда именно' },
  { file: '04_ya_v_puti.png',             num: '04', name: 'Я в пути',            desc: 'Стою на лапках и делаю вид, что так и было задумано' },
  { file: '05_osmatrivaetsya.png',        num: '05', name: 'Осматривается',       desc: 'Начинаю понимать, где я и куда дальше' },
  { file: '06_sobiraet_instrumenty.png',  num: '06', name: 'Собирает инструменты', desc: 'Нашла пару штуковин, которые и правда помогают' },
  { file: '07_probuet_krylya.png',        num: '07', name: 'Пробует крылья',      desc: 'Пока не полёт, но уже очень подозрительно' },
  { file: '08_letit.png',                 num: '08', name: 'Летит',               desc: 'Оторвалась от земли. Немного сама в шоке' },
  { file: '09_koroleva_stai.png',         num: '09', name: 'Королева стаи',       desc: 'Не стала идеальной. Просто теперь у неё есть крылья, корона и план' },
];

const grid = document.getElementById('grid');
STAGES.forEach(s => {
  const card = document.createElement('div');
  card.className = 'stage';
  card.innerHTML = `
    <div class="holder"><img src="birds/${s.file}" alt="${s.name}"></div>
    <div class="num">${s.num}</div>
    <div class="name">${s.name}</div>
    <div class="desc">${s.desc}</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
