<title>Воробей-скаут · эскизы</title>
<style>
  :root{
    --ink:#1a1614; --soft:#4a423d; --muted:#857c75;
    --bg:#f7f2e7; --paper:#fbf8ee; --milk:#f3ecdb;
    --accent:#f0b400; --accent-soft:#f4ebd0; --accent-deep:#7a5b00;
    --sage:#6f8a6a; --sage-deep:#2f4434; --sage-soft:#cfd9c2; --mint-soft:#d9e2cd;
    --rust:#a05a3c; --line:#e1dcd1;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:32px 24px 64px;
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.55;
  }
  .wrap{max-width:1100px; margin:0 auto}
  h1{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:36px; font-weight:600; letter-spacing:-.02em; margin:0 0 8px;
  }
  .sub{color:var(--soft); font-size:15px; margin:0 0 36px; max-width:680px}

  .stages{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:18px;
  }
  .stage{
    background:var(--paper); border:1.5px solid var(--ink);
    border-radius:18px; padding:20px 18px 22px;
    text-align:center;
  }
  .stage.award{border-color:var(--accent); box-shadow:0 6px 0 0 var(--accent-soft)}
  .stage .holder{
    width:140px; height:160px; margin:0 auto 14px;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .stage .holder svg{max-width:100%; max-height:100%}
  .stage .day{
    font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:700;
    color:var(--sage-deep);
  }
  .stage .name{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:17px; font-weight:600; margin:2px 0 6px; line-height:1.2;
  }
  .stage .desc{font-size:12px; color:var(--muted); line-height:1.4}
  .stage .award-tag{
    margin-top:8px; font-size:11px; font-weight:700; color:var(--accent-deep);
    letter-spacing:.06em;
  }
</style>
</head>

  <div class="stages" id="grid"></div>
