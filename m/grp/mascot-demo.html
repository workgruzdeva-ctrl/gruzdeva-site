<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Маскот-эволюция · Группа СДВГ</title>
<style>
  :root{
    --ink:#1a1614; --soft:#4a423d; --muted:#857c75;
    --bg:#f7f2e7; --paper:#fbf8ee;
    --accent:#f0b400; --accent-soft:#f4ebd0; --accent-deep:#7a5b00;
    --sage:#6f8a6a; --sage-deep:#2f4434; --sage-soft:#cfd9c2; --mint-soft:#d9e2cd;
    --line:#e1dcd1;
  }
  *{box-sizing:border-box}
  body{
    margin:0; padding:32px 24px 64px;
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.55;
  }
  .wrap{max-width:1100px; margin:0 auto}
  h1{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:36px; font-weight:600; letter-spacing:-.02em; margin:0 0 8px;
  }
  .sub{color:var(--soft); font-size:15px; margin:0 0 36px; max-width:680px}

  /* GRID of stages */
  .stages{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    gap:18px; margin-bottom:48px;
  }
  .stage{
    background:var(--paper); border:1.5px solid var(--ink);
    border-radius:18px; padding:20px 18px 22px;
    text-align:center;
  }
  .stage .holder{
    width:140px; height:160px; margin:0 auto 14px;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .stage .holder svg{
    max-width:100%; max-height:100%; display:block;
  }
  .stage .tier{
    font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    font-weight:700; color:var(--sage-deep);
  }
  .stage .name{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:18px; font-weight:600; margin:2px 0 6px;
    letter-spacing:-.01em;
  }
  .stage .pts{
    font-size:13px; color:var(--muted);
  }
  .stage .pts strong{color:var(--accent-deep); font-weight:700}

  /* INTERACTIVE PROGRESS */
  .demo{
    background:var(--paper); border:1.5px solid var(--ink);
    border-radius:20px; padding:36px 32px;
    margin-bottom:28px;
  }
  .demo-grid{
    display:grid; grid-template-columns:240px 1fr; gap:36px; align-items:center;
  }
  .demo-mascot{
    width:220px; height:240px;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .demo-info h2{
    font-family:"Charter","Iowan Old Style","Georgia",serif;
    font-size:26px; font-weight:600; margin:0 0 6px; letter-spacing:-.015em;
  }
  .demo-info .stage-label{
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    font-weight:700; color:var(--sage-deep); margin-bottom:6px;
  }
  .demo-info .demo-pts{
    font-size:14px; color:var(--soft); margin-bottom:14px;
  }
  .bar{
    height:14px; border-radius:100px;
    background:var(--mint-soft);
    border:1.5px solid var(--ink);
    position:relative; overflow:hidden;
    margin-bottom:10px;
  }
  .bar-fill{
    height:100%; background:var(--accent);
    transition:width .4s cubic-bezier(.2,.7,.2,1);
    border-right:1.5px solid var(--ink);
  }
  .bar-meta{
    font-size:12px; color:var(--muted); display:flex; justify-content:space-between;
  }
  input[type=range]{
    width:100%; accent-color:var(--accent-deep); margin-top:16px;
  }

  @media (max-width:640px){
    .demo-grid{grid-template-columns:1fr; gap:20px}
    .demo-mascot{margin:0 auto}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Эволюция маскота</h1>
  <p class="sub">Гусёныш растёт по мере того, как участник выполняет упражнения и приходит на встречи. Семь стадий — от яйца до боевого гуся. Подвинь ползунок ниже, чтобы посмотреть переход.</p>

  <!-- INTERACTIVE -->
  <div class="demo">
    <div class="demo-grid">
      <div class="demo-mascot" id="bigMascot"></div>
      <div class="demo-info">
        <div class="stage-label" id="stageLabel">Стадия</div>
        <h2 id="stageName">…</h2>
        <div class="demo-pts" id="ptsLabel">— баллов из 400</div>
        <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
        <div class="bar-meta"><span>0</span><span>следующая стадия →</span><span id="nextThr">…</span></div>
        <input type="range" id="ptsRange" min="0" max="450" value="0" step="5">
      </div>
    </div>
  </div>

  <h2 style="font-family:Charter,Georgia,serif; font-size:22px; margin:32px 0 14px">Все семь стадий</h2>
  <div class="stages" id="stagesGrid"></div>
</div>

// Render grid
const grid = document.getElementById('stagesGrid');
MASCOTS.forEach(m => {
  const card = document.createElement('div');
  card.className = 'stage';
  const next = MASCOTS[m.tier + 1];
  const range = next ? `${m.threshold}–${next.threshold - 1}` : `${m.threshold}+`;
  card.innerHTML = `
    <div class="holder">${m.svg}</div>
    <div class="tier">Стадия ${m.tier}</div>
    <div class="name">${m.name}</div>
    <div class="pts"><strong>${range}</strong> баллов</div>
  `;
  grid.appendChild(card);
});

// Interactive
const range = document.getElementById('ptsRange');
const bigMascot = document.getElementById('bigMascot');
const stageLabel = document.getElementById('stageLabel');
const stageName = document.getElementById('stageName');
const ptsLabel = document.getElementById('ptsLabel');
const barFill = document.getElementById('barFill');
const nextThr = document.getElementById('nextThr');

function findStage(pts){
  for (let i = MASCOTS.length - 1; i >= 0; i--){
    if (pts >= MASCOTS[i].threshold) return i;
  }
  return 0;
}

function update(pts){
  const idx = findStage(pts);
  const m = MASCOTS[idx];
  const next = MASCOTS[idx + 1];
  bigMascot.innerHTML = m.svg;
  stageLabel.textContent = `СТАДИЯ ${m.tier} · ${m.name.toUpperCase()}`;
  stageName.textContent = m.name;
  ptsLabel.textContent = `${pts} баллов из 400`;
  if (next){
    const progress = (pts - m.threshold) / (next.threshold - m.threshold);
    barFill.style.width = Math.min(100, Math.max(0, progress * 100)) + '%';
    nextThr.textContent = `${next.threshold} · ${next.name}`;
  } else {
    barFill.style.width = '100%';
    nextThr.textContent = 'максимум!';
  }
}

range.addEventListener('input', e => update(+e.target.value));
update(0);
